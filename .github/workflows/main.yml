name: PiRC-100 & PiRC1 Protocol Integrity CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integrity-check:
    name: PiRC-100 Deterministic Validation & Security Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Cross-version compatibility testing for ecosystem stability (Node 18 & 20)
        node-version: [18.x, 20.x] 

    steps:
    - name: 🛰️ Checkout Repository
      uses: actions/checkout@v4 # Upgraded to v4 for enhanced reliability and security

    - name: 🟢 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4 # Aligned with GitHub's latest runner environment
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 📦 Install Hardened Dependencies
      # Enforcing deterministic dependency resolution via 'npm ci' to prevent supply chain drift
      run: npm ci 

    - name: 🏗️ Verify Deterministic Build
      # Ensures that TypeScript compilation adheres to the production-hardened tsconfig.json
      run: npm run build

    - name: 🧪 Run Integrity Tests (RFC 8785 Fixed-Point Suite)
      # Executing precision validation and generating 100% coverage artifacts for PiRC-100 compliance
      run: npm test -- --coverage 

    - name: 🛡️ Security Audit (Production Grade)
      # Proactively auditing for high-risk vulnerabilities in the project dependencies
      run: npm audit --audit-level=high

    - name: 📊 Upload Coverage Results
      if: always()
      # Archiving coverage reports to verify adherence to the mandatory 100% function coverage policy
      uses: actions/upload-artifact@v4 
      with:
        name: coverage-report-node-${{ matrix.node-version }}
        path: coverage/
