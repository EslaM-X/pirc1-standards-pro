name: PiRC1 Protocol Integrity CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integrity-check:
    name: Standard Validation & Security Audit
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Cross-version compatibility testing for ecosystem stability
        node-version: [18.x, 20.x] 

    steps:
    - name: 🛰️ Checkout Repository
      uses: actions/checkout@v4 # Upgraded to v4 for enhanced reliability and security

    - name: 🟢 Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4 # Aligned with GitHub's latest runner environment
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 📦 Install Hardened Dependencies
      # Enforcing deterministic dependency resolution via 'npm ci'
      run: npm ci 

    - name: 🏗️ Verify Deterministic Build
      run: npm run build

    - name: 🧪 Run Integrity Tests (Fixed-Point Suite)
      # Executing precision validation and generating coverage artifacts
      run: npm test -- --coverage 

    - name: 🛡️ Security Audit
      # Proactively auditing for high-risk vulnerabilities in the supply chain
      run: npm audit --audit-level=high

    - name: 📊 Upload Coverage Results
      if: always()
      # Upgraded to v4 to resolve artifact deprecation issues (Referencing GitHub's 2024 standards)
      uses: actions/upload-artifact@v4 
      with:
        name: coverage-report-${{ matrix.node-version }}
        path: coverage/
